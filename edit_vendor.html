{% extends 'base.html' %}
{% block title %}Edit {{ vendor.full_name }}{% endblock %}

{% block content %}
<div class="page-header">
  <h2>
    <a href="{{ url_for('vendor_detail', vendor_id=vendor.id) }}" class="back-link">← {{ vendor.full_name }}</a>
    Edit vendor
  </h2>
</div>

<div class="card form-card">
  <form method="POST" action="{{ url_for('edit_vendor', vendor_id=vendor.id) }}">
    <div class="form-grid">

      <div class="form-group">
        <label>Full name <span class="required">*</span></label>
        <input type="text" name="full_name" value="{{ vendor.full_name }}" required>
      </div>

      <div class="form-group">
        <label>Phone <span class="required">*</span></label>
        <input type="tel" name="phone" value="{{ vendor.phone }}" required>
      </div>

      <div class="form-group">
        <label>National ID</label>
        <input type="text" name="nin" value="{{ vendor.nin }}">
      </div>

      <div class="form-group">
        <label>Street / zone <span class="required">*</span></label>
        <select name="street" required>
          {% for s in streets %}
          <option value="{{ s.name }}" {% if vendor.street == s.name %}selected{% endif %}>{{ s.name }}</option>
          {% endfor %}
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Trade type <span class="required">*</span></label>
        <select name="trade_type" required>
          {% for t in ['Food & Produce','Clothing','Electronics','Crafts & Art','Services','Other'] %}
          <option {% if vendor.trade_type==t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Stall number</label>
        <input type="text" name="stall_number" value="{{ vendor.stall_number }}">
      </div>

      <div class="form-group">
        <label>Status</label>
        <select name="status">
          {% for s in ['Active','NotPaid','Pending','Expired'] %}
          <option {% if vendor.status==s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group form-full">
        <label>Notes</label>
        <textarea name="notes" rows="3">{{ vendor.notes }}</textarea>
      </div>

    </div>
    <div class="form-actions">
      <a href="{{ url_for('vendor_detail', vendor_id=vendor.id) }}" class="btn-ghost">Cancel</a>
      <button type="submit" class="btn-primary">
        <i class="fa-solid fa-floppy-disk"></i> Save changes
      </button>
    </div>
  </form>
</div>
{% endblock %}
