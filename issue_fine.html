{% extends 'base.html' %}
{% block title %}Issue Penalty Fine{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Issue Penalty Fine</h2>
</div>

<div class="card" style="max-width: 600px;">
  <form method="POST" action="{{ url_for('issue_fine') }}" class="form-grid">
    
    <div class="form-group" style="grid-column: 1 / -1;">
        <label>Select Vendor</label>
        <select name="vendor_id" required>
            <option value="">-- Choose Vendor --</option>
            {% for v in vendors %}
            <option value="{{ v.id }}" {% if request.args.get('vendor_id')|int == v.id %}selected{% endif %}>{{ v.vendor_id }} - {{ v.full_name }} ({{ v.street }})</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group" style="grid-column: 1 / -1;">
        <label>Violation Reason</label>
        <select name="reason" required>
            <option value="">-- Select Offense --</option>
            <option value="Operating outside designated zone">Operating outside designated zone</option>
            <option value="Littering">Littering</option>
            <option value="Noise complaint">Noise complaint</option>
            <option value="Expired Permit Navigation">Expired Permit Violation</option>
            <option value="Late Operations">Late Operations</option>
        </select>
    </div>

    <div class="form-group" style="grid-column: 1 / -1;">
        <label>Fine Amount (UGX)</label>
        <input type="number" name="amount" min="1000" step="1000" required placeholder="e.g. 50000">
    </div>

    <div class="form-group" style="grid-column: 1 / -1; display:flex; gap:10px; margin-top:20px;">
      <button type="submit" class="btn-primary">Issue Fine</button>
      <a href="{{ url_for('fines') }}" class="btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
